name: Fetch news

on:
  # GitHub Actionsのschedule(cron)トリガーが2026-07-19に導入以降一度も発火しなかったため
  # (workflow_dispatchでの手動実行は毎回成功していたので、YAML構文やコード自体の問題ではない)、
  # 以下の対策を実施済み:
  #  1) cron式を「*/5」から5分オフセット付きの明示列挙に変更(毎時0分/5分ちょうどの
  #     スケジュールはGitHub側の負荷集中で間引かれやすいと公式ドキュメントに記載があるため)
  #  2) 別ファイル cron-dispatch.yml に独立したschedule付きワークフローを新設し、
  #     そちらからこのワークフローをworkflow_dispatch(REST API)経由で起動する二重化を実施
  #     (新規追加のワークフローの方がスケジューラーに正しく登録されることがあるため)。
  #     どちらか一方のscheduleが発火すれば news.json は更新され続ける。
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch RSS feeds and generate news.json / sources.js
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json sources.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update news.json [automated]"
            git pull --rebase origin main
            git push
          fi
