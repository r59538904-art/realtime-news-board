name: Fetch news

on:
  # 起動経路は2本:
  #  1) 外部cronサービスからのworkflow_dispatch — 実質的な主経路
  #  2) 下記schedule — 外部サービスが止まった場合の無料の保険(5分間隔)。
  #     GitHubのスケジューラーは発火しない・大きく遅れることが多いため、これ単独では当てにしない。
  #     毎時0分/5分ちょうどは負荷集中で間引かれやすいと公式ドキュメントにあるため、オフセット付きで列挙している
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch RSS feeds and generate news.json / sources.js
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          # 外部cronサービス経由の高頻度(1分おき)実行と手動実行が近接すると、コミット直前は
          # 差分が無くても、push直前にorigin/mainが進んでいて競合(non-fast-forward)することがある。
          # news.json/sources.jsはボットが全体を生成し直すファイルであり、他ランの内容と3-way mergeする
          # 意味がない(どちらの内容も「その時点で最新の取得結果」として等しく正しいため、後勝ちでよい)。
          # rebaseではなく、origin/mainへの単純なreset --mixed(作業ツリーは変更しない)で
          # 「最新のorigin/mainの上に、自分が取得した内容をそのまま積み直す」方式で再試行する。
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git add news.json sources.js
            if git diff --staged --quiet; then
              echo "No changes to commit."
              exit 0
            fi
            git commit -m "chore: update news.json [automated]"
            if git push; then
              echo "Push succeeded (attempt $i)."
              exit 0
            fi
            echo "Push failed (attempt $i) - likely a race with another concurrent run. Retrying..."
            git fetch origin main
            git reset --mixed origin/main
            sleep $(( (RANDOM % 4) + 2 ))
          done
          echo "::error::Failed to push news.json after multiple attempts"
          exit 1
