name: Fetch news

on:
  # 起動は外部cronサービスからのworkflow_dispatch(毎分)のみ。
  # GitHub内蔵のschedule(cron)も併設していたが、このリポジトリでは
  # ほぼ発火しない(全期間で1回のみ、それもキャンセル)実績だったため撤去した。
  # 外部cronサービスが止まると更新も止まるので、止まった場合はまずそちらを確認すること。
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch RSS feeds and generate news.json / sources.js
        run: python scripts/fetch_news.py

      - name: Check external API health (stock proxy / translation)
        continue-on-error: true  # 死活監視の不具合でニュース取得・コミットが止まらないようにする
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/health_check.py

      - name: Commit and push if changed
        run: |
          # 外部cronサービス経由の高頻度(1分おき)実行と手動実行が近接すると、コミット直前は
          # 差分が無くても、push直前にorigin/mainが進んでいて競合(non-fast-forward)することがある。
          # news.json/sources.jsはボットが全体を生成し直すファイルであり、他ランの内容と3-way mergeする
          # 意味がない(どちらの内容も「その時点で最新の取得結果」として等しく正しいため、後勝ちでよい)。
          # rebaseではなく、origin/mainへの単純なreset --mixed(作業ツリーは変更しない)で
          # 「最新のorigin/mainの上に、自分が取得した内容をそのまま積み直す」方式で再試行する。
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git add news.json sources.js status.json
            if git diff --staged --quiet; then
              echo "No changes to commit."
              exit 0
            fi
            git commit -m "chore: update news.json [automated]"
            if git push; then
              echo "Push succeeded (attempt $i)."
              exit 0
            fi
            echo "Push failed (attempt $i) - likely a race with another concurrent run. Retrying..."
            git fetch origin main
            git reset --mixed origin/main
            sleep $(( (RANDOM % 4) + 2 ))
          done
          echo "::error::Failed to push news.json after multiple attempts"
          exit 1
