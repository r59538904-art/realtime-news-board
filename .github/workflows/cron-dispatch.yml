name: Cron dispatcher

# fetch-news.yml のschedule(cron)がGitHubのスケジューラーに一度も拾われない問題への冗長化対策。
# このワークフローは自分ではニュース取得やコミットを一切行わず、fetch-news.yml を
# workflow_dispatch(REST API)経由で起動するだけの「目覚まし時計」役に徹する。
# ファイルを書き換えるのは常に fetch-news.yml 側の1本のみなので、両方のscheduleが
# 発火するようになっても競合しない(fetch-news.yml側のconcurrencyグループで直列化される)。
# 片方のscheduleしか発火しない状態でも news.json の定期更新は維持される。
# ※ どちらのscheduleが実際に発火しているかは Actions タブの各実行の「イベント」列
#   (schedule / workflow_dispatch)で確認できる。fetch-news.yml 側のscheduleが安定して
#   発火するようになったら、このファイルは削除してよい。

on:
  schedule:
    # fetch-news.yml側(3,8,13,...)とは別のオフセット。両方発火した場合の無駄な重複を
    # 減らしつつ、こちら単独でも5分間隔を維持できる列挙にしている。
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'
  workflow_dispatch: {}

permissions:
  actions: write

concurrency:
  group: cron-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger fetch-news workflow via workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run fetch-news.yml --ref main --repo "${{ github.repository }}"
